name: CI - Build e Teste

on:
  push:
    branches:
      - master

permissions:
  contents: read
  checks: write

jobs:
  build-and-test:
    name: Job de Build e Teste
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.15.1'
          cache: 'yarn'

      - name: Instalar Yarn
        run: npm install -g yarn

      - name: Instalar dependências
        run: yarn install --frozen-lockfile

      - name: Executar testes de API
        run: npm run api

      - name: Publicar relatório de testes (JUnit)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: test-results/api-junit-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload artifact (relatório bruto)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: test-results/